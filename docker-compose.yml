version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bula2026_db
    environment:
      POSTGRES_USER: bula_user
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: bula2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bula_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bula2026_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://bula_user:secret@postgres:5432/bula2026
      JWT_SECRET: your-secret-key-change-in-production
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    stdin_open: true
    tty: true

  # Frontend will be run separately with: npm install && npm run dev

volumes:
  postgres_data:
