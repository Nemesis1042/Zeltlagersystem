version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0-alpine
    container_name: bula2026_db
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: bula2026
      MYSQL_USER: bula_user
      MYSQL_PASSWORD: bula_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend-php/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bula2026_network

  # PHP Backend
  backend:
    image: php:8.1-apache
    container_name: bula2026_backend
    ports:
      - "8000:80"
    volumes:
      - ./backend-php:/var/www/html
      - ./backend-php/public/.htaccess:/var/www/html/.htaccess
    environment:
      DB_HOST: mysql
      DB_NAME: bula2026
      DB_USER: bula_user
      DB_PASS: bula_password
      JWT_SECRET: your-secret-key-change-in-production
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - bula2026_network
    command: sh -c "a2enmod rewrite && apache2-foreground"

  # Frontend (optional - usually run separately with npm run dev)
  # To use: uncomment below and run: docker-compose up
  # frontend:
  #   image: node:18-alpine
  #   container_name: bula2026_frontend
  #   ports:
  #     - "5173:5173"
  #   volumes:
  #     - ./frontend:/app
  #   working_dir: /app
  #   command: sh -c "npm install && npm run dev"
  #   depends_on:
  #     - backend
  #   networks:
  #     - bula2026_network

volumes:
  mysql_data:

networks:
  bula2026_network:
    driver: bridge
